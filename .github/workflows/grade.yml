name: "Lab 1 — Guided Questions Grading"

on:
  push:
    paths:
      - "answers.env"
      - "scripts/check_answers.sh"
      - ".github/workflows/grade.yml"

jobs:
  check-answers:
    name: Check answers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # LAB1_ANSWER_KEY is defined as a GitHub organization secret
      - name: Write answer key (temporary, runner only)
        env:
          LAB1_ANSWER_KEY: ${{ secrets.LAB1_ANSWER_KEY }}
        run: |
          if [[ -z "$LAB1_ANSWER_KEY" ]]; then
            echo "ERROR: Secret LAB1_ANSWER_KEY is not configured in this repository."
            echo "       Set it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "$LAB1_ANSWER_KEY" > /tmp/answer_key.env

      - name: Run grader
        run: |
          chmod +x scripts/check_answers.sh
          bash scripts/check_answers.sh answers.env /tmp/answer_key.env | tee -a "$GITHUB_STEP_SUMMARY"
