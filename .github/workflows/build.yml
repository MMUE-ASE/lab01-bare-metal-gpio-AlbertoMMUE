name: "Lab 1 — Build Verification"

on:
  push:
    paths:
      - "src/**"
      - "inc/**"
      - "startup/**"
      - "linker/**"
      - "scripts/build.sh"
      - ".github/workflows/build.yml"

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install arm-none-eabi toolchain
        run: sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi

      - name: Build
        env:
          # Only promote to error the warnings that typically indicate real bugs.
          # Avoid global -Werror so the initial skeleton (stubs with unused
          # parameters) does not break CI before the student starts.
          EXTRA_CFLAGS: "-Werror=implicit-function-declaration -Werror=return-type -Werror=incompatible-pointer-types"
        run: |
          chmod +x scripts/build.sh
          bash scripts/build.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-lab1
          path: |
            output/lab1.elf
            output/lab1.bin
            output/lab1.hex
